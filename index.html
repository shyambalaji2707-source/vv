<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEC Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#b71c1c;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:420px;
    background:#fff;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
    width:140px;
    height:140px;
    object-fit:contain;
    margin-bottom:15px;
}

h1{
    color:#b71c1c;
    font-size:30px;
    margin-bottom:5px;
}

h3{
    color:#555;
    margin-bottom:25px;
}

.input-group{
    text-align:left;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:13px;
    background:#b71c1c;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#8d1515;
}

a{
    text-decoration:none;
    color:#b71c1c;
    font-weight:bold;
}

.footer{
    margin-top:25px;
    color:#555;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<img src="images.png" alt="AEC Logo" class="logo">

<h1>Adhiparasakthi Engineering College</h1>

<h3>Melmaruvathur</h3>

<form>

<div class="input-group">
<label>Username</label>
<input type="text" placeholder="Enter Username" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Enter Password" required>
</div>

<button type="submit">Login</button>

</form>

<br>

<a href="#">Forgot Password?</a>

<div class="footer">

<p>© 2025 Adhiparasakthi Engineering College</p>

<p><b>Study | Spirituality | Service</b></p>

</div>

</div>

</body>
</html>
